<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Market</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
        }
        header {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }
        .productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .producto {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        button {
            background: white;
            color: black;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>Elite Market</header>

<section class="productos">
    <div class="producto">
        <h3>Producto 1</h3>
        <p>$10</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <h3>Producto 2</h3>
        <p>$20</p>
        <button>Comprar</button>
    </div>
</section>

</body>
</html>
